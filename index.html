<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座席グループ分けツールVer1.3</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  .controls {
    background-color: #f4f4f4;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .control-group {
    margin-bottom: 10px;
  }
  input[type="number"] {
    width: 60px;
    padding: 5px;
  }
  button {
    padding: 8px 16px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    margin-right: 5px;
  }
  button:hover {
    background-color: #0056b3;
  }
  
  #seat-map {
    display: inline-grid;
    gap: 5px;
    margin-bottom: 20px;
    background-color: #fff;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  .seat {
    width: 50px;
    height: 50px;
    background-color: #e0e0e0;
    border: 1px solid #aaa;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    font-weight: bold;
    transition: background-color 0.2s;
  }
  .seat:hover {
    filter: brightness(0.9);
  }
  .seat.absent {
    background-color: #555 !important;
    color: #fff !important;
    border-color: #333;
  }
  .group-name {
    font-size: 14px;
  }
  .seat-count {
    font-size: 10px;
    color: #555;
  }
</style>
</head>
<body>

  <h2>座席グループ分けツール</h2>

  <div class="controls">
    <div class="control-group">
      <label>縦の列 (行): <input type="number" id="rows" value="6" min="1" max="20"></label> × 
      <label>横の列 (列): <input type="number" id="cols" value="6" min="1" max="20"></label>
      <button onclick="createMap()">表を作成</button>
    </div>
    <hr>
    <div class="control-group">
      <label>目標の人数: <span id="group-size-val">4</span>人</label>
      <span style="font-size: 0.9em; color: #666; margin-left: 10px;">※孤立を防ぐため、実際の人数は自動調整されます</span><br>
      <input type="range" id="group-size" min="2" max="8" value="4" oninput="updateSliderValue(this.value)">
    </div>
    <button onclick="generateGroups()" style="background-color: #28a745;">グループ分けを実行</button>
    <button onclick="resetColors()" style="background-color: #6c757d;">色をリセット</button>
  </div>

  <p>※黒くしたい部分（欠席・通路など）はクリックしてください。</p>

  <div id="seat-map"></div>

<script>
  let currentRows = 0;
  let currentCols = 0;

  function updateSliderValue(val) {
    document.getElementById('group-size-val').innerText = val;
  }

  function createMap() {
    const rows = parseInt(document.getElementById('rows').value);
    const cols = parseInt(document.getElementById('cols').value);
    const mapDiv = document.getElementById('seat-map');
    
    currentRows = rows;
    currentCols = cols;
    
    mapDiv.innerHTML = '';
    mapDiv.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
    mapDiv.style.gridTemplateRows = `repeat(${rows}, 50px)`;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.id = `seat-${r}-${c}`;
        seat.innerHTML = `<span class="group-name"></span><span class="seat-count"></span>`;
        seat.onclick = () => {
          seat.classList.toggle('absent');
          seat.querySelector('.group-name').innerText = seat.classList.contains('absent') ? '✖' : '';
          seat.querySelector('.seat-count').innerText = '';
          seat.style.backgroundColor = ''; 
        };
        mapDiv.appendChild(seat);
      }
    }
  }

  function resetColors() {
    const seats = document.querySelectorAll('.seat:not(.absent)');
    seats.forEach(seat => {
      seat.style.backgroundColor = '';
      seat.style.color = '#000';
      seat.querySelector('.group-name').innerText = '';
      seat.querySelector('.seat-count').innerText = '';
    });
  }

  function generateGroups() {
    resetColors();
    const targetSize = parseInt(document.getElementById('group-size').value);
    
    // 「目標3人なら最小3人」「目標4人以上なら最小(目標-1)人」を許容ラインとする
    const minSize = targetSize >= 4 ? targetSize - 1 : targetSize; 

    let seatMap = new Map();
    let unassigned = new Set();
    
    // 欠席以外の席をマップに登録
    for (let r = 0; r < currentRows; r++) {
      for (let c = 0; c < currentCols; c++) {
        const seatDiv = document.getElementById(`seat-${r}-${c}`);
        if (seatDiv && !seatDiv.classList.contains('absent')) {
          let seatObj = { r, c, id: `${r}-${c}`, element: seatDiv };
          seatMap.set(seatObj.id, seatObj);
          unassigned.add(seatObj);
        }
      }
    }

    if (unassigned.size === 0) {
      alert("有効な席がありません。");
      return;
    }

    // 上下左右の隣接席を取得する関数
    function getNeighbors(seat, targetSet) {
      let neighbors = [];
      let dirs = [[-1,0], [1,0], [0,-1], [0,1]]; // 上,下,左,右
      for (let [dr, dc] of dirs) {
        let id = `${seat.r + dr}-${seat.c + dc}`;
        if (seatMap.has(id)) {
          let s = seatMap.get(id);
          if (targetSet.has(s)) neighbors.push(s);
        }
      }
      return neighbors;
    }

    let groups = [];

    // フェーズ1：隣接する席をくっつけていく（四角くまとめる）
    while (unassigned.size > 0) {
      // 残された席が少なく孤立しそうな「端っこ」の席からスタートする
      let bestStart = null;
      let minNeighbors = Infinity;
      for (let seat of unassigned) {
        let count = getNeighbors(seat, unassigned).length;
        if (count < minNeighbors) {
          minNeighbors = count;
          bestStart = seat;
        }
      }

      let currentGroup = [bestStart];
      unassigned.delete(bestStart);

      // 目標人数に達するか、周りに空き席がなくなるまで拡張
      while (currentGroup.length < targetSize) {
        let candidateSet = new Set();
        for (let member of currentGroup) {
          let nbs = getNeighbors(member, unassigned);
          nbs.forEach(n => candidateSet.add(n));
        }

        if (candidateSet.size === 0) break; // 周りが欠席や他のグループで塞がれた場合

        let candidates = Array.from(candidateSet);
        let centroidR = currentGroup.reduce((sum, s) => sum + s.r, 0) / currentGroup.length;
        let centroidC = currentGroup.reduce((sum, s) => sum + s.c, 0) / currentGroup.length;

        // 候補席の評価：グループと接している辺が多いほど（四角になりやすい）高評価
        candidates.forEach(cand => {
          let connections = 0;
          for (let member of currentGroup) {
            if (Math.abs(cand.r - member.r) + Math.abs(cand.c - member.c) === 1) {
              connections++;
            }
          }
          cand.connections = connections;
          cand.distToCentroid = Math.pow(cand.r - centroidR, 2) + Math.pow(cand.c - centroidC, 2);
        });

        // 1. 接する辺の数が多い順 2. 重心に近い順 に並び替え
        candidates.sort((a, b) => {
          if (b.connections !== a.connections) return b.connections - a.connections;
          return a.distToCentroid - b.distToCentroid;
        });

        let bestCand = candidates[0];
        currentGroup.push(bestCand);
        unassigned.delete(bestCand);
      }
      groups.push(currentGroup);
    }

    // フェーズ2：小さすぎるグループ（孤立した席）を隣のグループに吸収させる
    let seatToGroupIdx = new Map();
    groups.forEach((g, i) => g.forEach(s => seatToGroupIdx.set(s.id, i)));

    let changed = true;
    while (changed) {
      changed = false;
      for (let i = 0; i < groups.length; i++) {
        let group = groups[i];
        if (!group || group.length === 0) continue;

        // 許容人数（minSize）未満のグループを見つけたら
        if (group.length < minSize) {
          let neighborGroups = new Set();
          for (let seat of group) {
            let dirs = [[-1,0], [1,0], [0,-1], [0,1]];
            for (let [dr, dc] of dirs) {
              let id = `${seat.r + dr}-${seat.c + dc}`;
              if (seatToGroupIdx.has(id)) {
                let adjIdx = seatToGroupIdx.get(id);
                if (adjIdx !== i) neighborGroups.add(adjIdx);
              }
            }
          }

          // 隣接するグループがあれば、一番人数の少ないグループに合流（吸収）する
          if (neighborGroups.size > 0) {
            let bestAdj = -1;
            let minAdjSize = Infinity;
            for (let adjIdx of neighborGroups) {
              if (groups[adjIdx] && groups[adjIdx].length < minAdjSize) {
                minAdjSize = groups[adjIdx].length;
                bestAdj = adjIdx;
              }
            }

            groups[bestAdj].push(...group);
            group.forEach(s => seatToGroupIdx.set(s.id, bestAdj));
            groups[i] = []; // グループを空にする
            changed = true;
            break; // 配列が変化したので最初からチェックし直す
          }
        }
      }
    }

    // 空になったグループを削除
    groups = groups.filter(g => g.length > 0);

    const colors = [
      '#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', 
      '#E8BAFF', '#FFBAE1', '#E2F0CB', '#FFC8A2', '#D5AAFF',
      '#85E3FF', '#B9F2FF', '#F3FFE3', '#FFABAB', '#C4FAF8'
    ];
    
    // 画面に色と名前を描画
    groups.forEach((group, index) => {
      let color = colors[index % colors.length];
      let groupSize = group.length;
      group.forEach((seat) => {
        seat.element.style.backgroundColor = color;
        seat.element.style.color = '#333';
        seat.element.querySelector('.group-name').innerText = `G${index + 1}`;
        // グループが何人編成になったか小さく表示（確認用）
        seat.element.querySelector('.seat-count').innerText = `(${groupSize}人)`;
      });
    });
  }

  window.onload = createMap;
</script>
</body>
</html>
