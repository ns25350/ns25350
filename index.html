<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座席グループ分けツール</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  .controls {
    background-color: #f4f4f4;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .control-group {
    margin-bottom: 10px;
  }
  input[type="number"] {
    width: 60px;
    padding: 5px;
  }
  button {
    padding: 8px 16px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover {
    background-color: #0056b3;
  }
  
  /* 座席表のスタイル */
  #seat-map {
    display: inline-grid;
    gap: 5px;
    margin-bottom: 20px;
    background-color: #fff;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  .seat {
    width: 50px;
    height: 50px;
    background-color: #e0e0e0;
    border: 1px solid #aaa;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    font-weight: bold;
    transition: background-color 0.2s;
  }
  .seat:hover {
    filter: brightness(0.9);
  }
  /* 欠席・空席のスタイル */
  .seat.absent {
    background-color: #555 !important;
    color: #fff !important;
    border-color: #333;
    text-decoration: line-through;
  }
</style>
</head>
<body>

  <h2>座席グループ分けツール</h2>

  <div class="controls">
    <div class="control-group">
      <label>縦の列 (行): <input type="number" id="rows" value="6" min="1" max="20"></label> × 
      <label>横の列 (列): <input type="number" id="cols" value="6" min="1" max="20"></label>
      <button onclick="createMap()">表を作成</button>
    </div>
    <hr>
    <div class="control-group">
      <label>1グループの人数: <span id="group-size-val">4</span>人</label><br>
      <input type="range" id="group-size" min="2" max="8" value="4" oninput="updateSliderValue(this.value)">
    </div>
    <button onclick="generateGroups()" style="background-color: #28a745;">グループ分けを実行</button>
    <button onclick="resetColors()" style="background-color: #6c757d;">色をリセット</button>
  </div>

  <p>※黒くしたい部分（欠席・通路など）はクリックしてください。</p>

  <div id="seat-map"></div>

<script>
  let currentRows = 0;
  let currentCols = 0;

  // スライダーの値表示を更新
  function updateSliderValue(val) {
    document.getElementById('group-size-val').innerText = val;
  }

  // 座席表を作成する
  function createMap() {
    const rows = parseInt(document.getElementById('rows').value);
    const cols = parseInt(document.getElementById('cols').value);
    const mapDiv = document.getElementById('seat-map');
    
    currentRows = rows;
    currentCols = cols;
    
    mapDiv.innerHTML = '';
    // CSS Gridを使用して行列を設定
    mapDiv.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
    mapDiv.style.gridTemplateRows = `repeat(${rows}, 50px)`;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.id = `seat-${r}-${c}`;
        // 席をクリックしたときの処理（欠席・空席の切り替え）
        seat.onclick = () => {
          seat.classList.toggle('absent');
          seat.innerText = seat.classList.contains('absent') ? '✖' : '';
          seat.style.backgroundColor = ''; // 色をリセット
        };
        mapDiv.appendChild(seat);
      }
    }
  }

  // グループ分けの色をリセット
  function resetColors() {
    const seats = document.querySelectorAll('.seat:not(.absent)');
    seats.forEach(seat => {
      seat.style.backgroundColor = '';
      seat.style.color = '#000';
      seat.innerText = '';
    });
  }

  // グループ分けを実行
  function generateGroups() {
    resetColors();
    const groupSize = parseInt(document.getElementById('group-size').value);
    let availableSeats = [];
    
    // 有効な（欠席ではない）席をすべて取得
    for (let r = 0; r < currentRows; r++) {
      for (let c = 0; c < currentCols; c++) {
        const seatDiv = document.getElementById(`seat-${r}-${c}`);
        if (seatDiv && !seatDiv.classList.contains('absent')) {
          availableSeats.push({ r, c, element: seatDiv });
        }
      }
    }

    if (availableSeats.length === 0) {
      alert("有効な席がありません。");
      return;
    }

    let groups = [];
    let unassigned = [...availableSeats];

    // 近い席をまとめるアルゴリズム（貪欲法）
    while (unassigned.length > 0) {
      // まだグループになっていない一番左上の席を基準にする
      let centerSeat = unassigned.shift();
      let currentGroup = [centerSeat];
      
      // 残りの席を、基準の席からの「直線距離」が近い順に並び替え
      unassigned.sort((a, b) => {
        let distA = Math.pow(a.r - centerSeat.r, 2) + Math.pow(a.c - centerSeat.c, 2);
        let distB = Math.pow(b.r - centerSeat.r, 2) + Math.pow(b.c - centerSeat.c, 2);
        return distA - distB;
      });

      // スライダーで設定した人数から、基準の1人を引いた人数分を取得
      let needed = groupSize - 1;
      let picked = unassigned.splice(0, needed);
      currentGroup.push(...picked);
      
      groups.push(currentGroup);
    }

    // グループごとに色分けするパレット
    const colors = [
      '#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', 
      '#E8BAFF', '#FFBAE1', '#E2F0CB', '#FFC8A2', '#D5AAFF',
      '#85E3FF', '#B9F2FF', '#F3FFE3', '#FFABAB', '#C4FAF8'
    ];
    
    // 結果を画面に反映する
    groups.forEach((group, index) => {
      let color = colors[index % colors.length];
      group.forEach((seat, seatIndex) => {
        seat.element.style.backgroundColor = color;
        seat.element.style.color = '#333';
        seat.element.innerText = `G${index + 1}`;
      });
    });
  }

  // 初期化時に6x6の表を作成しておく
  window.onload = createMap;
</script>
</body>
</html>
