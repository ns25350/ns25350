<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座席グループ分けツール(BETA)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>座席グループ分けツール(開発中)</h2>

  <div class="controls">
    <div class="control-group">
      <label>縦の列 (行): <input type="number" id="rows" value="6" min="1" max="20"></label> × 
      <label>横の列 (列): <input type="number" id="cols" value="6" min="1" max="20"></label>
      <button onclick="createMap()">表を作成</button>
    </div>
    <hr>
    <div class="control-group">
      <label>目標の人数: <span id="group-size-val">4</span>人</label>
      <span style="font-size: 0.9em; color: #666; margin-left: 10px;">※目標人数から ±1人 の範囲内で自動調整します</span><br>
      <input type="range" id="group-size" min="2" max="8" value="4" oninput="updateSliderValue(this.value)">
    </div>
    
    <div class="control-group" style="margin-top: 15px; margin-bottom: 15px;">
      <label style="cursor: pointer; font-weight: bold; color: #333;">
        <input type="checkbox" id="allow-movement" checked style="transform: scale(1.2); margin-right: 5px;">
        欠席席を移動させて、グループの形を正方形に近づける
      </label>
      <div style="font-size: 0.85em; color: #666; margin-left: 25px; margin-top: 3px;">
        ※チェックを外すと、欠席の机はそのままの位置に固定され、それを避けるようにグループが作られます（形は少し崩れます）。
      </div>
    </div>
    <button onclick="generateGroups()" class="btn-generate">グループ分けを実行</button>
    <button onclick="resetColors()" class="btn-reset">色をリセット</button>
  </div>

  <p>※席をクリックして状態を切り替えてください。<br>
  <strong>【白】</strong>通常（人がいる） → <strong>【黄】</strong>欠席（机はあるが人がいない） → <strong>【黒】</strong>空白・通路（机がない）</p>

  <div id="seat-map"></div>

  <script src="script.js"></script>
</body>
</html>
