<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座席グループ分けツール (改良版)</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  .controls {
    background-color: #f4f4f4;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .control-group {
    margin-bottom: 10px;
  }
  input[type="number"] {
    width: 60px;
    padding: 5px;
  }
  button {
    padding: 8px 16px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover {
    background-color: #0056b3;
  }
  
  #seat-map {
    display: inline-grid;
    gap: 5px;
    margin-bottom: 20px;
    background-color: #fff;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  .seat {
    width: 50px;
    height: 50px;
    background-color: #e0e0e0;
    border: 1px solid #aaa;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    font-weight: bold;
    transition: background-color 0.2s;
  }
  .seat:hover {
    filter: brightness(0.9);
  }
  .seat.absent {
    background-color: #555 !important;
    color: #fff !important;
    border-color: #333;
    text-decoration: line-through;
  }
</style>
</head>
<body>

  <h2>座席グループ分けツール</h2>

  <div class="controls">
    <div class="control-group">
      <label>縦の列 (行): <input type="number" id="rows" value="6" min="1" max="20"></label> × 
      <label>横の列 (列): <input type="number" id="cols" value="6" min="1" max="20"></label>
      <button onclick="createMap()">表を作成</button>
    </div>
    <hr>
    <div class="control-group">
      <label>1グループの人数: <span id="group-size-val">4</span>人</label><br>
      <input type="range" id="group-size" min="2" max="8" value="4" oninput="updateSliderValue(this.value)">
    </div>
    <button onclick="generateGroups()" style="background-color: #28a745;">グループ分けを実行</button>
    <button onclick="resetColors()" style="background-color: #6c757d;">色をリセット</button>
  </div>

  <p>※黒くしたい部分（欠席・通路など）はクリックしてください。</p>

  <div id="seat-map"></div>

<script>
  let currentRows = 0;
  let currentCols = 0;

  function updateSliderValue(val) {
    document.getElementById('group-size-val').innerText = val;
  }

  function createMap() {
    const rows = parseInt(document.getElementById('rows').value);
    const cols = parseInt(document.getElementById('cols').value);
    const mapDiv = document.getElementById('seat-map');
    
    currentRows = rows;
    currentCols = cols;
    
    mapDiv.innerHTML = '';
    mapDiv.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
    mapDiv.style.gridTemplateRows = `repeat(${rows}, 50px)`;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.id = `seat-${r}-${c}`;
        seat.onclick = () => {
          seat.classList.toggle('absent');
          seat.innerText = seat.classList.contains('absent') ? '✖' : '';
          seat.style.backgroundColor = ''; 
        };
        mapDiv.appendChild(seat);
      }
    }
  }

  function resetColors() {
    const seats = document.querySelectorAll('.seat:not(.absent)');
    seats.forEach(seat => {
      seat.style.backgroundColor = '';
      seat.style.color = '#000';
      seat.innerText = '';
    });
  }

  function generateGroups() {
    resetColors();
    const groupSize = parseInt(document.getElementById('group-size').value);
    let availableSeats = [];
    
    for (let r = 0; r < currentRows; r++) {
      for (let c = 0; c < currentCols; c++) {
        const seatDiv = document.getElementById(`seat-${r}-${c}`);
        if (seatDiv && !seatDiv.classList.contains('absent')) {
          availableSeats.push({ r, c, element: seatDiv });
        }
      }
    }

    if (availableSeats.length === 0) {
      alert("有効な席がありません。");
      return;
    }

    let groups = [];
    let unassigned = [...availableSeats];

    while (unassigned.length > 0) {
      // 最初の1人を一番左上の空席から選ぶ
      let firstSeat = unassigned.shift();
      let currentGroup = [firstSeat];
      
      while (currentGroup.length < groupSize && unassigned.length > 0) {
        // グループの「中心（重心）」を計算
        let sumR = 0, sumC = 0;
        for (let member of currentGroup) {
          sumR += member.r;
          sumC += member.c;
        }
        let centroidR = sumR / currentGroup.length;
        let centroidC = sumC / currentGroup.length;

        // 残りの席を評価
        let candidates = unassigned.map(seat => {
          // グループの誰かからマス目上で何個離れているか（隣接判定用）
          let minManhattan = Infinity;
          for (let member of currentGroup) {
            let dist = Math.abs(seat.r - member.r) + Math.abs(seat.c - member.c);
            if (dist < minManhattan) minManhattan = dist;
          }
          // グループの中心からの距離（まとまりやすくするため）
          let distToCentroid = Math.pow(seat.r - centroidR, 2) + Math.pow(seat.c - centroidC, 2);
          
          return { seat, minManhattan, distToCentroid };
        });

        // 優先度をつけて並び替え：
        // 1. まず「隣り合っているか」を最優先（欠席を飛び越えない）
        // 2. 隣接度が同じなら、「グループの中心に近いか」を優先（一列にならない）
        candidates.sort((a, b) => {
          if (a.minManhattan !== b.minManhattan) {
            return a.minManhattan - b.minManhattan;
          }
          return a.distToCentroid - b.distToCentroid;
        });

        // 最も条件に合う席を追加
        let bestSeat = candidates[0].seat;
        currentGroup.push(bestSeat);
        
        // 選ばれた席を未割り当てリストから削除
        unassigned = unassigned.filter(s => s !== bestSeat);
      }
      
      groups.push(currentGroup);
    }

    const colors = [
      '#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', 
      '#E8BAFF', '#FFBAE1', '#E2F0CB', '#FFC8A2', '#D5AAFF',
      '#85E3FF', '#B9F2FF', '#F3FFE3', '#FFABAB', '#C4FAF8'
    ];
    
    groups.forEach((group, index) => {
      let color = colors[index % colors.length];
      group.forEach((seat) => {
        seat.element.style.backgroundColor = color;
        seat.element.style.color = '#333';
        seat.element.innerText = `G${index + 1}`;
      });
    });
  }

  window.onload = createMap;
</script>
</body>
</html>
